<section class="panel narrow">
    <h1>Личный кабинет</h1>
    {{message}}
    <form method="post" action="/login">
        <label>Логин
            <input name="username" required autocomplete="username" placeholder="Логин">
        </label>
        <label>Пароль
            <input name="password" required type="password" autocomplete="current-password" placeholder="Введите пароль">
        </label>
        <button class="button primary" type="submit">Войти</button>
    </form>
</section>
