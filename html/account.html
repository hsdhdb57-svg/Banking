<section class="account-head">
    <div>
        <p class="eyebrow">Аккаунт {{username}}</p>
        <h1>{{owner}}</h1>
    </div>
    <a class="button" href="/account">Выйти</a>
</section>

{{message}}

{{cards}}

<section class="balance-panel">
    <span>Баланс выбранной карты</span>
    <strong id="cardBalance">{{balance}}</strong>
</section>

<section class="grid three">
    <div class="panel">
        <h2>Пополнение</h2>
        <form method="post" action="/account/deposit">
            <input type="hidden" name="id" value="{{accountId}}">
            <label>Сумма
                <input name="amount" required inputmode="decimal" placeholder="250.00">
            </label>
            <button class="button primary" type="submit">Пополнить</button>
        </form>
    </div>
    <div class="panel">
        <h2>Снятие</h2>
        <form method="post" action="/account/withdraw">
            <input type="hidden" name="id" value="{{accountId}}">
            <label>Сумма
                <input name="amount" required inputmode="decimal" placeholder="100.00">
            </label>
            <button class="button" type="submit">Снять</button>
        </form>
    </div>
    <div class="panel">
        <h2>Перевод</h2>
        <form method="post" action="/account/transfer">
            <input type="hidden" name="fromId" value="{{accountId}}">
            <label>Номер карты получателя
                <input name="toCard" required inputmode="numeric" maxlength="19" placeholder="4000 1234 5678 9012">
            </label>
            <label>Сумма
                <input name="amount" required inputmode="decimal" placeholder="300.00">
            </label>
            <button class="button primary" type="submit">Перевести</button>
        </form>
    </div>
</section>

<section class="panel history-panel">
    <h2>История счета</h2>
    {{transactions}}
</section>

<script>
function copyText(value) {
    if (navigator.clipboard) {
        navigator.clipboard.writeText(value);
        return;
    }
    const input = document.createElement('input');
    input.value = value;
    document.body.appendChild(input);
    input.select();
    document.execCommand('copy');
    input.remove();
}

function toggleCardNumber(button) {
    const full = button.dataset.full;
    const mask = button.dataset.mask;
    const isOpen = button.textContent === full;
    button.textContent = isOpen ? mask : full;
    copyText(full);
}

function scrollCards(direction) {
    const list = document.getElementById('cardsList');
    if (!list) return;
    list.scrollBy({ left: direction * 340, behavior: 'smooth' });
}
</script>
