<section class="hero">
    <div>
        <h1>Мини-банкинг</h1>
        <p>Счета, карты, переводы по номеру карты, история операций и просмотр базы данных.</p>
    </div>
    <div class="actions">
        <a class="button primary" href="/account">Личный кабинет</a>
        <a class="button" href="/database">База данных</a>
    </div>
</section>
{{message}}
<section class="grid two">
    <div class="panel">
        <h2>Создать счет</h2>
        <form method="post" action="/create-account">
            <label>Имя пользователя
                <input name="owner" required maxlength="120" placeholder="Имя">
            </label>
            <label>Логин
                <input name="username" required maxlength="80" placeholder="Логин">
            </label>
            <label>Пароль
                <input name="password" required type="password" placeholder="Введите пароль">
            </label>
            <label>Начальный баланс
                <input name="balance" required inputmode="decimal" placeholder="1000.00">
            </label>
            <button class="button primary" type="submit">Создать</button>
        </form>
    </div>
    <div class="panel">
        <h2>Счета</h2>
        {{accountsTable}}
    </div>
</section>
